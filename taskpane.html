<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tony's Excel AI Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      padding: 20px;
      min-height: 100vh;
    }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      color: #888;
    }
    
    .feature-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      background: #2a2a2a;
    }
    
    .tab-btn.active {
      background: #1e3a5f;
      border-color: #4a9eff;
    }
    
    .feature-panel {
      display: none;
    }
    
    .feature-panel.active {
      display: block;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    .input-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    
    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
    }
    
    .input-group input:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: #4a9eff;
    }
    
    .input-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8a 100%);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 158, 255, 0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .result-box {
      margin-top: 16px;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #4a9eff;
      min-height: 40px;
      word-break: break-all;
    }
    
    .result-box:empty::before {
      content: 'Result will appear here...';
      color: #666;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #888;
      font-size: 12px;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #333;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
    }
    
    .api-key-section {
      margin-bottom: 20px;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 6px;
      border: 1px solid #333;
    }
    
    .api-key-section label {
      font-size: 11px;
      color: #888;
    }
    
    .api-key-section input {
      margin-top: 6px;
      font-size: 11px;
    }
    
    .info-text {
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Excel AI Assistant</h1>
    <p>Powered by OpenAI GPT-4</p>
  </div>
  
  <div class="api-key-section">
    <label>OpenAI API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
  </div>
  
  <div class="feature-tabs">
    <button class="tab-btn active" data-tab="formula">Formula</button>
    <button class="tab-btn" data-tab="clean">Clean Data</button>
    <button class="tab-btn" data-tab="explain">Explain</button>
  </div>
  
  <!-- Formula Generator Panel -->
  <div class="feature-panel active" id="formula-panel">
    <div class="input-group">
      <label>Describe what you want</label>
      <textarea id="formulaPrompt" placeholder="Example: Calculate 10% bonus if sales in column B is greater than 1000"></textarea>
    </div>
    <button class="btn-primary" id="generateFormula">Generate Formula</button>
    <div class="result-box" id="formulaResult"></div>
    <button class="btn-primary" id="insertFormula" style="margin-top: 8px; display: none;">Insert into Cell</button>
  </div>
  
  <!-- Data Cleaner Panel -->
  <div class="feature-panel" id="clean-panel">
    <div class="input-group">
      <label>Selected Range</label>
      <input type="text" id="selectedRange" placeholder="Select cells in Excel..." readonly />
    </div>
    <button class="btn-primary" id="analyzeData">Analyze Data</button>
    <div class="result-box" id="cleanResult"></div>
  </div>
  
  <!-- Explain Formula Panel -->
  <div class="feature-panel" id="explain-panel">
    <div class="input-group">
      <label>Paste Excel Formula</label>
      <input type="text" id="formulaToExplain" placeholder="=VLOOKUP(A1, B:C, 2, FALSE)" />
    </div>
    <button class="btn-primary" id="explainFormula">Explain Formula</button>
    <div class="result-box" id="explainResult"></div>
  </div>
  
  <p class="info-text">
    💡 Tip: Select a cell or range in Excel before using features. 
    Your API key is stored locally and never sent to our servers.
  </p>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.feature-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });
    
    // OpenAI API call
    async function callOpenAI(prompt, apiKey) {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.3,
          max_tokens: 500
        })
      });
      
      if (!response.ok) throw new Error('API call failed');
      const data = await response.json();
      return data.choices[0].message.content;
    }
    
    // Formula Generator
    document.getElementById('generateFormula').addEventListener('click', async () => {
      const prompt = document.getElementById('formulaPrompt').value;
      const apiKey = document.getElementById('apiKey').value;
      const resultBox = document.getElementById('formulaResult');
      const insertBtn = document.getElementById('insertFormula');
      
      if (!prompt || !apiKey) {
        resultBox.innerHTML = '<span class="error">Please enter a description and API key</span>';
        return;
      }
      
      resultBox.innerHTML = '<div class="loading"><div class="spinner"></div>Generating...</div>';
      insertBtn.style.display = 'none';
      
      try {
        const fullPrompt = `Convert this request to an Excel formula. Only return the formula, no explanation: "${prompt}"`;
        const formula = await callOpenAI(fullPrompt, apiKey);
        resultBox.textContent = formula;
        insertBtn.style.display = 'block';
        
        // Store for insertion
        resultBox.dataset.formula = formula;
      } catch (error) {
        resultBox.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    });
    
    // Insert formula into Excel
    document.getElementById('insertFormula').addEventListener('click', async () => {
      const formula = document.getElementById('formulaResult').dataset.formula;
      if (!formula) return;
      
      try {
        await Excel.run(async (context) => {
          const range = context.workbook.getSelectedRange();
          range.values = [[formula]];
          await context.sync();
        });
      } catch (error) {
        alert('Error inserting formula: ' + error.message);
      }
    });
    
    // Data Cleaner
    document.getElementById('analyzeData').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value;
      const resultBox = document.getElementById('cleanResult');
      
      if (!apiKey) {
        resultBox.innerHTML = '<span class="error">Please enter API key</span>';
        return;
      }
      
      resultBox.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing...</div>';
      
      try {
        // Get selected data from Excel
        let data;
        await Excel.run(async (context) => {
          const range = context.workbook.getSelectedRange();
          range.load('values');
          await context.sync();
          data = range.values;
        });
        
        const fullPrompt = `Analyze this Excel data and identify issues (typos, inconsistencies, missing values). Suggest fixes:\n${JSON.stringify(data.slice(0, 10))}`;
        const analysis = await callOpenAI(fullPrompt, apiKey);
        resultBox.textContent = analysis;
      } catch (error) {
        resultBox.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    });
    
    // Formula Explainer
    document.getElementById('explainFormula').addEventListener('click', async () => {
      const formula = document.getElementById('formulaToExplain').value;
      const apiKey = document.getElementById('apiKey').value;
      const resultBox = document.getElementById('explainResult');
      
      if (!formula || !apiKey) {
        resultBox.innerHTML = '<span class="error">Please enter a formula and API key</span>';
        return;
      }
      
      resultBox.innerHTML = '<div class="loading"><div class="spinner"></div>Explaining...</div>';
      
      try {
        const fullPrompt = `Explain this Excel formula in simple terms: ${formula}`;
        const explanation = await callOpenAI(fullPrompt, apiKey);
        resultBox.textContent = explanation;
      } catch (error) {
        resultBox.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    });
    
    // Update selected range display
    Office.onReady(() => {
      setInterval(async () => {
        try {
          await Excel.run(async (context) => {
            const range = context.workbook.getSelectedRange();
            range.load('address');
            await context.sync();
            document.getElementById('selectedRange').value = range.address;
          });
        } catch (e) {
          // Excel not ready
        }
      }, 1000);
    });
  </script>
</body>
</html>
